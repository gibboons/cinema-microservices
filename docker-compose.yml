version: "3.9"

services:

  film_upload_service:
    image: cinema/film_upload_service:latest
    build:
      context: .
      dockerfile: film_upload_service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - AMQP_URL=${AMQP_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - FILM_UPLOAD_DB_HOST=${FILM_UPLOAD_DB_HOST}
      - FILM_UPLOAD_DB_PORT=${FILM_UPLOAD_DB_PORT}
      - FILM_UPLOAD_DB_NAME=${FILM_UPLOAD_DB_NAME}
      - FILM_UPLOAD_DB_USER=${FILM_UPLOAD_DB_USER}
      - FILM_UPLOAD_DB_PASSWORD=${FILM_UPLOAD_DB_PASSWORD}
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    networks:
      - cinema-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 30s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s

  metadata_service:
    image: cinema/metadata_service:latest
    build:
      context: .
      dockerfile: metadata_service/Dockerfile
    environment:
      - AMQP_URL=${AMQP_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - METADATA_DB_HOST=${METADATA_DB_HOST}
      - METADATA_DB_PORT=${METADATA_DB_PORT}
      - METADATA_DB_NAME=${METADATA_DB_NAME}
      - METADATA_DB_USER=${METADATA_DB_USER}
      - METADATA_DB_PASSWORD=${METADATA_DB_PASSWORD}
    command: uvicorn main:app --host 0.0.0.0 --port 8002
    networks:
      - cinema-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 30s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  transcoding_service:
    image: cinema/transcoding_service:latest
    build:
      context: .
      dockerfile: transcoding_service/Dockerfile
    environment:
      - AMQP_URL=${AMQP_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - DYNAMODB_TRANSCODING_TABLE=${DYNAMODB_TRANSCODING_TABLE}
    command: uvicorn main:app --host 0.0.0.0 --port 8003
    networks:
      - cinema-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 30s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  review_service:
    image: cinema/review_service:latest
    build:
      context: .
      dockerfile: review_service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - AMQP_URL=${AMQP_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - DYNAMODB_REVIEWS_TABLE=${DYNAMODB_REVIEWS_TABLE}
    command: uvicorn main:app --host 0.0.0.0 --port 8004
    networks:
      - cinema-network
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 30s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s

  rating_service:
    image: cinema/rating_service:latest
    build:
      context: .
      dockerfile: rating_service/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - AMQP_URL=${AMQP_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - RATING_DB_HOST=${RATING_DB_HOST}
      - RATING_DB_PORT=${RATING_DB_PORT}
      - RATING_DB_NAME=${RATING_DB_NAME}
      - RATING_DB_USER=${RATING_DB_USER}
      - RATING_DB_PASSWORD=${RATING_DB_PASSWORD}
    command: uvicorn main:app --host 0.0.0.0 --port 8005
    networks:
      - cinema-network
    deploy:
      replicas: 4
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 30s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s

networks:
  cinema-network:
    driver: overlay
    attachable: true
